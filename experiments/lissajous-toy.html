<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lissajous Toy</title>
<style>
  :root{
    --bg:#efece4; --card:#f7f5f0; --ink:#26221a; --muted:#857e6e;
    --line:#dcd7cb; --accent:#2268ff;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg);color:var(--ink);
    font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased}
  .page{max-width:920px;margin:0 auto;padding:28px 20px 60px}
  .head{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:6px}
  h1{font-size:18px;font-weight:600;margin:0;letter-spacing:.2px}
  .head p{margin:0;color:var(--muted);font-size:13px}

  .stage{background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:18px;margin:14px 0;position:relative}
  #big{display:block;width:100%;height:auto;cursor:pointer;touch-action:manipulation}
  .toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:6px}
  .wordwrap{display:flex;align-items:center;gap:8px;flex:1;min-width:160px}
  input[type=text]{background:#fff;border:1px solid var(--line);color:var(--ink);
    border-radius:9px;padding:8px 11px;font:inherit;letter-spacing:2px;text-transform:uppercase;width:100%}
  button{background:#fff;border:1px solid var(--line);color:var(--ink);border-radius:9px;
    padding:8px 13px;font:inherit;cursor:pointer;transition:.12s}
  button:hover{border-color:#bdb6a6;background:#fbfaf7}
  button.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  button.primary:hover{background:#3a78ff}

  .explorer{display:grid;grid-template-columns:300px 1fr;gap:18px;margin-top:18px}
  @media (max-width:720px){.explorer{grid-template-columns:1fr}}
  .viewer{background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:14px;display:flex;flex-direction:column;gap:10px;align-items:center}
  #one{display:block;width:100%;height:auto}
  .formula{font:13px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace;color:var(--muted);
    text-align:center;background:#fff;border:1px solid var(--line);border-radius:9px;padding:8px 10px;width:100%}
  .formula b{color:var(--ink);font-weight:600}

  .controls{display:flex;flex-direction:column;gap:14px}
  .who{display:flex;align-items:center;gap:10px}
  .who .dot{width:14px;height:14px;border-radius:50%}
  .who h2{font-size:15px;margin:0;font-weight:600}
  .who span{color:var(--muted);font-size:13px}
  .ctl{display:flex;align-items:center;gap:12px}
  .ctl .name{width:74px;flex:none;color:var(--muted);font-size:13px}
  .ctl input[type=range]{flex:1;min-width:0;accent-color:var(--accent)}
  .ctl .val{width:46px;flex:none;text-align:right;font-variant-numeric:tabular-nums;font-size:13px}
  .ctl input[type=color]{width:40px;height:30px;padding:0;border:1px solid var(--line);border-radius:8px;background:none;cursor:pointer}
  .mini{display:flex;gap:8px;flex-wrap:wrap;margin-top:2px}
  .mini button{padding:6px 11px;font-size:13px}
  .tiphint{color:var(--muted);font-size:12px;margin-top:2px}
</style>
</head>
<body>
<div class="page">
  <div class="head">
    <h1>Lissajous Toy</h1>
    <p>Click a letter to reshape its curve</p>
  </div>

  <div class="stage">
    <canvas id="big" width="900" height="260"></canvas>
    <div class="toolbar">
      <div class="wordwrap">
        <input type="text" id="word" value="COMPILE" maxlength="16" autocomplete="off" spellcheck="false" />
      </div>
      <button id="play" class="primary">Pause</button>
      <button id="rand">Randomize</button>
      <button id="reset">Reset</button>
    </div>
  </div>

  <div class="explorer">
    <div class="viewer">
      <canvas id="one" width="260" height="260"></canvas>
      <div class="formula">
        x = <b id="fA">40</b>&middot;sin(<b id="fa">1</b>t + <b id="fd">0.50</b>)<br>
        y = <b id="fB">40</b>&middot;sin(<b id="fb">2</b>t)
      </div>
    </div>

    <div class="controls">
      <div class="who">
        <span class="dot" id="selDot"></span>
        <h2 id="selName">C</h2>
        <span>this letter's curve</span>
      </div>
      <div class="ctl"><span class="name">Frequency a</span><input type="range" id="ca" min="1" max="7" step="1"><span class="val" id="caV">1</span></div>
      <div class="ctl"><span class="name">Frequency b</span><input type="range" id="cb" min="1" max="7" step="1"><span class="val" id="cbV">2</span></div>
      <div class="ctl"><span class="name">Phase &delta;</span><input type="range" id="cd" min="0" max="100" step="1"><span class="val" id="cdV">0.50</span></div>
      <div class="ctl"><span class="name">Rotate</span><input type="range" id="cr" min="-180" max="180" step="1"><span class="val" id="crV">0&deg;</span></div>
      <div class="ctl"><span class="name">Stretch</span><input type="range" id="cs" min="40" max="160" step="1"><span class="val" id="csV">1.0</span></div>
      <div class="ctl"><span class="name">Color</span><input type="color" id="cc"><span class="val"></span></div>
      <div class="mini">
        <button id="randOne">Surprise this one</button>
      </div>
      <p class="tiphint">Tip: hit Pause to freeze a shape, then tweak. The big wordmark gently drifts and rotates while playing.</p>
    </div>
  </div>
</div>

<script>
"use strict";
(function(){
  var BW=900, BH=260, SAMPLES=240;
  var palette=["#F76D18","#2C9F28","#A88D02","#8C89E7","#33312b","#916031","#2268FF",
               "#E0529B","#23B5B5","#6FAE1F"];
  var ratioBank=[[1,2],[1,1],[1,2],[2,3],[1,1],[2,3],[3,2],[3,4],[1,3],[4,3],[3,5],[2,5]];

  var big=document.getElementById("big"), bctx=big.getContext("2d");
  var one=document.getElementById("one"), octx=one.getContext("2d");

  var state={ word:"COMPILE", playing:true, sel:0, phase:0, letters:[] };

  function makeLetter(ch,i){
    var r=ratioBank[i%ratioBank.length];
    var step=BW/Math.max(1,state.word.length);
    return { ch:ch, a:r[0], b:r[1], delta:0.5, rot:0, scale:1.0,
             color:palette[i%palette.length], x:step*(i+0.5), y:BH/2 };
  }
  function rebuild(prev){
    var chars=state.word.split(""), out=[];
    var step=BW/Math.max(1,chars.length);
    for(var i=0;i<chars.length;i++){
      if(prev&&prev[i]&&prev[i].ch===chars[i]){ prev[i].x=step*(i+0.5); out.push(prev[i]); }
      else out.push(makeLetter(chars[i],i));
    }
    state.letters=out;
    if(state.sel>=out.length) state.sel=Math.max(0,out.length-1);
  }

  function curvePoints(L, phase, amp){
    var pts=[], d=phase+L.delta*2*Math.PI, A=amp*L.scale, B=amp*L.scale;
    for(var i=0;i<=SAMPLES;i++){
      var t=i/SAMPLES*Math.PI*2;
      pts.push([A*Math.sin(L.a*t+d), B*Math.sin(L.b*t)]);
    }
    return pts;
  }
  function strokePath(ctx,pts,cx,cy,rotRad,color,lw){
    var cos=Math.cos(rotRad), sin=Math.sin(rotRad);
    ctx.beginPath();
    for(var k=0;k<pts.length;k++){
      var x=pts[k][0]*cos-pts[k][1]*sin+cx;
      var y=pts[k][0]*sin+pts[k][1]*cos+cy;
      if(k===0)ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.strokeStyle=color; ctx.lineWidth=lw;
    ctx.lineJoin="round"; ctx.lineCap="round"; ctx.stroke();
  }

  var t0=performance.now(), tNow=0;
  function loop(now){
    tNow=(now-t0)/1000;
    if(state.playing) state.phase=tNow*0.25;
    drawBig(); drawOne();
    requestAnimationFrame(loop);
  }

  function drawBig(){
    bctx.clearRect(0,0,BW,BH);
    var amp=Math.min(46, (BW/Math.max(1,state.letters.length))*0.36);
    for(var i=0;i<state.letters.length;i++){
      var L=state.letters[i];
      var driftRot=(L.rot*Math.PI/180)+(state.playing? tNow*0.14 : 0)*(1);
      var pts=curvePoints(L, state.phase, amp);
      if(i===state.sel){
        bctx.beginPath();
        bctx.arc(L.x,L.y,amp*L.scale+12,0,Math.PI*2);
        bctx.fillStyle="rgba(34,104,255,.07)"; bctx.fill();
      }
      strokePath(bctx,pts,L.x,L.y,driftRot,L.color,2);
    }
  }

  function drawOne(){
    octx.clearRect(0,0,260,260);
    octx.strokeStyle="rgba(0,0,0,.06)"; octx.lineWidth=1;
    octx.beginPath();octx.moveTo(130,18);octx.lineTo(130,242);
    octx.moveTo(18,130);octx.lineTo(242,130);octx.stroke();
    var L=state.letters[state.sel]; if(!L)return;
    var pts=curvePoints(L, state.phase, 92);
    strokePath(octx,pts,130,130,L.rot*Math.PI/180,L.color,2.5);
    // trace dot
    var d=state.phase+L.delta*2*Math.PI;
    var tt=(tNow*0.6)%(Math.PI*2);
    var rx=92*L.scale*Math.sin(L.a*tt+d), ry=92*L.scale*Math.sin(L.b*tt);
    var cos=Math.cos(L.rot*Math.PI/180), sin=Math.sin(L.rot*Math.PI/180);
    octx.beginPath();
    octx.arc(rx*cos-ry*sin+130, rx*sin+ry*cos+130, 4.5,0,Math.PI*2);
    octx.fillStyle=L.color; octx.fill();
  }

  // ---- selection via click ----
  function toCv(e){
    var r=big.getBoundingClientRect();
    return { x:(e.clientX-r.left)*(BW/r.width), y:(e.clientY-r.top)*(BH/r.height) };
  }
  big.addEventListener("pointerdown",function(e){
    var p=toCv(e), best=0, bd=1e9;
    for(var i=0;i<state.letters.length;i++){
      var L=state.letters[i], d=Math.hypot(L.x-p.x,L.y-p.y);
      if(d<bd){bd=d;best=i;}
    }
    state.sel=best; syncControls();
  });

  // ---- controls ----
  var C={
    a:document.getElementById("ca"),aV:document.getElementById("caV"),
    b:document.getElementById("cb"),bV:document.getElementById("cbV"),
    d:document.getElementById("cd"),dV:document.getElementById("cdV"),
    r:document.getElementById("cr"),rV:document.getElementById("crV"),
    s:document.getElementById("cs"),sV:document.getElementById("csV"),
    c:document.getElementById("cc"),
    name:document.getElementById("selName"), dot:document.getElementById("selDot")
  };
  var F={A:document.getElementById("fA"),a:document.getElementById("fa"),d:document.getElementById("fd"),
         B:document.getElementById("fB"),b:document.getElementById("fb")};
  function sel(){ return state.letters[state.sel]; }
  function syncControls(){
    var L=sel(); if(!L)return;
    C.name.textContent=L.ch===" "?"space":L.ch; C.dot.style.background=L.color;
    C.a.value=L.a; C.aV.textContent=L.a;
    C.b.value=L.b; C.bV.textContent=L.b;
    C.d.value=Math.round(L.delta*100); C.dV.textContent=L.delta.toFixed(2);
    C.r.value=Math.round(L.rot); C.rV.textContent=Math.round(L.rot)+"°";
    C.s.value=Math.round(L.scale*100); C.sV.textContent=L.scale.toFixed(1);
    C.c.value=toHex(L.color);
    F.A.textContent=Math.round(92*L.scale); F.B.textContent=Math.round(92*L.scale);
    F.a.textContent=L.a; F.b.textContent=L.b; F.d.textContent=L.delta.toFixed(2);
  }
  function toHex(c){ if(/^#([0-9a-f]{6})$/i.test(c))return c;
    var g=document.createElement("canvas").getContext("2d"); g.fillStyle=c; return g.fillStyle; }

  C.a.oninput=function(){ sel().a=+this.value; C.aV.textContent=this.value; F.a.textContent=this.value; };
  C.b.oninput=function(){ sel().b=+this.value; C.bV.textContent=this.value; F.b.textContent=this.value; };
  C.d.oninput=function(){ sel().delta=+this.value/100; C.dV.textContent=sel().delta.toFixed(2); F.d.textContent=sel().delta.toFixed(2); };
  C.r.oninput=function(){ sel().rot=+this.value; C.rV.textContent=this.value+"°"; };
  C.s.oninput=function(){ sel().scale=+this.value/100; C.sV.textContent=sel().scale.toFixed(1);
    F.A.textContent=Math.round(92*sel().scale); F.B.textContent=Math.round(92*sel().scale); };
  C.c.oninput=function(){ sel().color=this.value; C.dot.style.background=this.value; };

  // ---- buttons ----
  var playBtn=document.getElementById("play");
  playBtn.onclick=function(){ state.playing=!state.playing; playBtn.textContent=state.playing?"Pause":"Play"; };
  document.getElementById("randOne").onclick=function(){ randomizeLetter(sel()); syncControls(); };
  document.getElementById("rand").onclick=function(){ state.letters.forEach(randomizeLetter); syncControls(); };
  function randomizeLetter(L){
    var r=ratioBank[Math.floor(Math.random()*ratioBank.length)];
    L.a=r[0]; L.b=r[1];
    L.delta=Math.round(Math.random()*100)/100;
    L.rot=Math.round((Math.random()*2-1)*60);
    L.scale=0.7+Math.random()*0.5;
  }
  document.getElementById("reset").onclick=function(){
    state.word="COMPILE"; document.getElementById("word").value="COMPILE";
    state.sel=0; state.playing=true; playBtn.textContent="Pause";
    rebuild(null); syncControls();
  };
  document.getElementById("word").oninput=function(){
    state.word=this.value.toUpperCase()||" ";
    rebuild(state.letters); syncControls();
  };

  // ---- init ----
  rebuild(null); syncControls();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
